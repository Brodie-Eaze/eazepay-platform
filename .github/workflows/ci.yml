name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Lint, Typecheck, Test (affected)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx affected base
        uses: nrwl/nx-set-shas@v4

      - name: Format check
        run: pnpm format:check

      - name: Lint (affected)
        run: pnpm affected:lint --parallel=3

      - name: Typecheck (affected)
        run: pnpm exec nx affected -t typecheck --parallel=3

      - name: Test (affected)
        run: pnpm affected:test --parallel=3 --ci

      - name: Build (affected)
        run: pnpm affected:build --parallel=3

  partner-portal-smoke:
    # Unconditional gate for the partner-portal app. The `validate` job
    # above uses `nx affected` which is good for the common case but
    # depends on Nx correctly detecting that partner-portal changed.
    # Belt-and-braces: when files under apps/partner-portal/** change
    # in this PR, we always run lint + typecheck + test + build for
    # this app, regardless of what Nx's affected analysis decided.
    # This caught the failure mode where partner-portal had no
    # project.json and was therefore invisible to `nx affected`.
    name: Partner-portal (unconditional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # dorny/paths-filter@v3 calls the PR listFiles endpoint to compute
    # the changed-files diff for the PR. That endpoint needs an
    # explicit `pull-requests: read` permission on PR runs, otherwise
    # the action errors with "Resource not accessible by integration".
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect partner-portal changes
        id: detect
        uses: dorny/paths-filter@v3
        with:
          filters: |
            partner-portal:
              - 'apps/partner-portal/**'
              - 'libs/**'
              - 'pnpm-lock.yaml'
              - 'package.json'

      - name: Setup pnpm
        if: steps.detect.outputs.partner-portal == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.detect.outputs.partner-portal == 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        if: steps.detect.outputs.partner-portal == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint partner-portal
        if: steps.detect.outputs.partner-portal == 'true'
        run: pnpm --filter @eazepay/partner-portal lint

      - name: Typecheck partner-portal
        if: steps.detect.outputs.partner-portal == 'true'
        run: pnpm --filter @eazepay/partner-portal typecheck

      - name: Test partner-portal
        if: steps.detect.outputs.partner-portal == 'true'
        run: pnpm --filter @eazepay/partner-portal test

      - name: Build partner-portal
        if: steps.detect.outputs.partner-portal == 'true'
        env:
          # Build-time env vars: stand-in values so `assertProdEnv` in
          # `middleware.ts` doesn't refuse to boot during `next build`.
          # NODE_ENV is `production` here (next build always sets it),
          # so the validator runs strictly.
          DEMO_COOKIE_SECRET: 'ci-build-only-secret-do-not-use-in-prod-32chars+'
          ACCOUNT_COOKIE_SECRET: 'ci-build-only-account-secret-do-not-use-32chars+'
          NEXT_PUBLIC_APP_ORIGIN: 'https://ci.example.com'
        run: pnpm --filter @eazepay/partner-portal build

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # gitleaks-action calls /repos/.../pulls/<n>/commits to scope the
    # PR scan to commits in this PR. That endpoint needs an explicit
    # pull-requests:read permission on PR runs; without it the action
    # hard-fails before the secret scan even runs.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # UDAAP / CFPA §§1031, 1036 — fail the build if any synthetic
      # NMLS / CFL / FDIC credential number, or a state-count claim,
      # regresses into the operator-UI master fixture. See the top-of-
      # file comment in apps/partner-portal/lib/master-data.ts.
      - name: master-data-no-credentials
        run: |
          set -e
          FILE=apps/partner-portal/lib/master-data.ts
          if grep -nE "NMLS #?[0-9]{4,}" "$FILE"; then
            echo "ERROR: synthetic NMLS number detected in $FILE" >&2
            exit 1
          fi
          if grep -nE "60DBO-?[0-9]+" "$FILE"; then
            echo "ERROR: synthetic CFL license number detected in $FILE" >&2
            exit 1
          fi
          if grep -nE "FDIC #?[0-9]{3,}" "$FILE"; then
            echo "ERROR: synthetic FDIC cert number detected in $FILE" >&2
            exit 1
          fi
          if grep -nE "(Licensed|Holds|in) [0-9]+ states" "$FILE"; then
            echo "ERROR: synthetic state-count claim detected in $FILE" >&2
            exit 1
          fi
          echo "OK: $FILE contains no synthetic lender-credential strings."

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/typescript p/javascript p/nodejs p/react

      - name: Trivy (dependency + IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      # SEC-210 — pnpm audit drift detector.
      # Warn-only for now (continue-on-error: true) so we get visibility
      # on new transitive HIGH/CRITICAL CVEs without breaking CI while
      # we work through the existing debt. Flip to a hard gate in a
      # follow-up once the baseline is clean and the .trivyignore
      # pattern is mirrored as a pnpm-audit allowlist.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: pnpm audit (high+) — warn-only drift detector
        continue-on-error: true
        run: pnpm audit --audit-level high
