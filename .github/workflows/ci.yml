name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Lint, Typecheck, Test (affected)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx affected base
        uses: nrwl/nx-set-shas@v4

      - name: Format check
        run: pnpm format:check

      - name: Lint (affected)
        run: pnpm affected:lint --parallel=3

      - name: Typecheck (affected)
        run: pnpm exec nx affected -t typecheck --parallel=3

      - name: Test (affected)
        run: pnpm affected:test --parallel=3 --ci

      - name: Build (affected)
        run: pnpm affected:build --parallel=3

  security:
    name: Security scans
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (SAST)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/typescript p/javascript p/nodejs p/react

      - name: Trivy (dependency + IaC)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
