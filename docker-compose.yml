services:
  postgres:
    image: postgres:16-alpine
    container_name: eazepay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eazepay
      POSTGRES_PASSWORD: eazepay
      POSTGRES_DB: eazepay
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eazepay -d eazepay']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eazepay-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: eazepay-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686' # UI
      - '4318:4318' # OTLP HTTP

volumes:
  postgres_data:
  redis_data:
