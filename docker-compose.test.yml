# ─────────────────────────────────────────────────────────────────────
# docker-compose.test.yml  —  integration-test back-end stack
# ─────────────────────────────────────────────────────────────────────
#
# Spins up Postgres 16 + Redis 7 on NON-default host ports (5433 / 6380)
# so this stack can coexist with the developer's `docker-compose.yml`
# stack (which binds 5432 / 6379) without collision. The intent is that
# you can run `pnpm dev` and `pnpm test:integration` against the same
# machine simultaneously.
#
# Both services are tmpfs-backed: every byte of state lives in RAM, so
# wiping between tests is `DROP DATABASE ... CREATE DATABASE` (or in
# practice TRUNCATE) and the entire stack tears down without leaving
# disk artefacts. Health-check loops are tight (every 2 s, 30 retries)
# so the integration-test setup hook can `docker compose up -d --wait`
# and proceed straight into `prisma migrate deploy` once both services
# are reporting healthy.
#
# Run manually (used by CI and the test-setup hook fallback):
#
#   docker compose -f docker-compose.test.yml up -d --wait
#   DATABASE_URL=postgresql://eazepay:eazepay@localhost:5433/eazepay_test \
#   REDIS_URL=redis://localhost:6380 \
#   pnpm --filter @eazepay/api prisma migrate deploy
#
# Tear down:
#
#   docker compose -f docker-compose.test.yml down -v
#
# ─────────────────────────────────────────────────────────────────────

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: eazepay-postgres-test
    restart: no
    environment:
      POSTGRES_USER: eazepay
      POSTGRES_PASSWORD: eazepay
      POSTGRES_DB: eazepay_test
      # fsync off + synchronous_commit off makes test inserts ~5x
      # faster. We're on tmpfs already so durability is moot.
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    command:
      - 'postgres'
      - '-c'
      - 'fsync=off'
      - '-c'
      - 'synchronous_commit=off'
      - '-c'
      - 'full_page_writes=off'
      - '-c'
      - 'shared_buffers=256MB'
      - '-c'
      - 'max_connections=200'
    ports:
      # Non-default host port so this stack doesn't collide with the
      # dev `docker-compose.yml` Postgres on 5432.
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U eazepay -d eazepay_test']
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  redis-test:
    image: redis:7-alpine
    container_name: eazepay-redis-test
    restart: no
    # --save '' disables RDB snapshotting, --appendonly no disables AOF.
    # Together they mean Redis never touches disk in the test stack.
    command: ['redis-server', '--save', '', '--appendonly', 'no']
    ports:
      # Non-default host port so this stack doesn't collide with the
      # dev `docker-compose.yml` Redis on 6379.
      - '6380:6379'
    tmpfs:
      - /data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 2s
